<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桁架结构承重受力演示</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>桁架结构承重受力演示</h1>
      <p class="subtitle">基础结构力学入门 · 三角桁架 & 平行桁架</p>
    </header>
    
    <div class="main-content">
      <div class="canvas-container">
        <canvas id="trussCanvas"></canvas>
        <div class="canvas-overlay">
          <div class="status-badge" id="statusBadge">
            <span class="status-dot"></span>
            <span class="status-text" id="statusText">稳定</span>
          </div>
          <div class="load-indicator">
            <div class="load-label">当前荷载</div>
            <div class="load-value" id="loadValue">0 kN</div>
            <div class="load-bar">
              <div class="load-bar-fill" id="loadBarFill"></div>
            </div>
            <div class="load-max" id="loadMax">最大承重: 0 kN</div>
          </div>
        </div>
      </div>
      
      <aside class="control-panel">
        <div class="control-section">
          <h3>桁架类型</h3>
          <div class="truss-type-selector">
            <button class="truss-btn active" data-type="triangular">
              <svg viewBox="0 0 100 60" class="truss-icon">
                <polygon points="50,5 95,55 5,55" fill="none" stroke="currentColor" stroke-width="2"/>
                <line x1="50" y1="5" x2="50" y2="55" stroke="currentColor" stroke-width="1"/>
                <line x1="27" y1="30" x2="73" y2="30" stroke="currentColor" stroke-width="1"/>
              </svg>
              <span>三角桁架</span>
            </button>
            <button class="truss-btn" data-type="parallel">
              <svg viewBox="0 0 100 60" class="truss-icon">
                <line x1="5" y1="15" x2="95" y2="15" stroke="currentColor" stroke-width="2"/>
                <line x1="5" y1="45" x2="95" y2="45" stroke="currentColor" stroke-width="2"/>
                <line x1="20" y1="15" x2="20" y2="45" stroke="currentColor" stroke-width="1"/>
                <line x1="50" y1="15" x2="50" y2="45" stroke="currentColor" stroke-width="1"/>
                <line x1="80" y1="15" x2="80" y2="45" stroke="currentColor" stroke-width="1"/>
                <line x1="5" y1="15" x2="20" y2="45" stroke="currentColor" stroke-width="1"/>
                <line x1="20" y1="15" x2="50" y2="45" stroke="currentColor" stroke-width="1"/>
                <line x1="50" y1="15" x2="80" y2="45" stroke="currentColor" stroke-width="1"/>
                <line x1="80" y1="15" x2="95" y2="45" stroke="currentColor" stroke-width="1"/>
              </svg>
              <span>平行桁架</span>
            </button>
          </div>
        </div>
        
        <div class="control-section">
          <h3>荷载设置</h3>
          <div class="slider-group">
            <label for="loadSlider">
              <span>荷载等级</span>
              <span class="value-display" id="loadSliderValue">0 kN</span>
            </label>
            <input type="range" id="loadSlider" min="0" max="100" value="0" step="1">
            <div class="slider-labels">
              <span>轻载</span>
              <span>中载</span>
              <span>重载</span>
              <span>极限</span>
            </div>
          </div>
          
          <div class="slider-group">
            <label for="loadPointsSlider">
              <span>荷载点数</span>
              <span class="value-display" id="loadPointsSliderValue">3</span>
            </label>
            <input type="range" id="loadPointsSlider" min="1" max="7" value="3" step="1">
          </div>
        </div>
        
        <div class="control-section">
          <h3>杆件参数</h3>
          <div class="slider-group">
            <label for="memberThicknessSlider">
              <span>杆件粗细</span>
              <span class="value-display" id="memberThicknessSliderValue">4</span>
            </label>
            <input type="range" id="memberThicknessSlider" min="1" max="10" value="4" step="0.5">
          </div>
          
          <div class="slider-group">
            <label for="segmentCountSlider">
              <span>节间数量</span>
              <span class="value-display" id="segmentCountSliderValue">4</span>
            </label>
            <input type="range" id="segmentCountSlider" min="2" max="8" value="4" step="1">
          </div>
        </div>
        
        <div class="control-section">
          <h3>连接方式</h3>
          <div class="connection-selector">
            <label class="radio-label">
              <input type="radio" name="connection" value="pin" checked>
              <span class="radio-custom"></span>
              <span>铰接（可转动）</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="connection" value="rigid">
              <span class="radio-custom"></span>
              <span>刚接（固定）</span>
            </label>
          </div>
        </div>
        
        <div class="control-section">
          <h3>显示选项</h3>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="showForces" checked>
              <span class="checkbox-custom"></span>
              <span>显示受力方向</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="showDeformation" checked>
              <span class="checkbox-custom"></span>
              <span>显示形变放大</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="showStress" checked>
              <span class="checkbox-custom"></span>
              <span>显示应力着色</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="showLabels">
              <span class="checkbox-custom"></span>
              <span>显示节点标签</span>
            </label>
          </div>
        </div>
        
        <div class="control-section">
          <h3>形变放大</h3>
          <div class="slider-group">
            <label for="deformationScaleSlider">
              <span>放大倍数</span>
              <span class="value-display" id="deformationScaleSliderValue">10x</span>
            </label>
            <input type="range" id="deformationScaleSlider" min="1" max="50" value="10" step="1">
          </div>
        </div>
        
        <div class="control-actions">
          <button class="btn btn-primary" id="resetBtn">重置结构</button>
          <button class="btn btn-secondary" id="testBtn">自动测试</button>
        </div>
        
        <div class="info-panel">
          <h4>受力分析</h4>
          <div class="info-grid">
            <div class="info-item">
              <span class="info-label">最大压力</span>
              <span class="info-value" id="maxCompression">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">最大拉力</span>
              <span class="info-value" id="maxTension">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">最大位移</span>
              <span class="info-value" id="maxDisplacement">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">安全系数</span>
              <span class="info-value" id="safetyFactor">-</span>
            </div>
          </div>
          <div class="stress-legend">
            <span>受压</span>
            <div class="legend-bar">
              <div class="legend-gradient"></div>
            </div>
            <span>受拉</span>
          </div>
        </div>
      </aside>
    </div>
    
    <div class="tips-panel">
      <div class="tip-item">
        <strong>💡 三角桁架：</strong>适用于大跨度屋面，上弦杆受压、下弦杆受拉，三角形外形使内力分布更均匀。
      </div>
      <div class="tip-item">
        <strong>💡 平行桁架：</strong>又名华伦桁架，杆件规格统一，便于工业化生产，常用于桥梁和厂房。
      </div>
      <div class="tip-item">
        <strong>💡 铰接 vs 刚接：</strong>铰接节点允许杆件转动，仅传递轴力；刚接节点还能传递弯矩和剪力。
      </div>
    </div>
  </div>
  
  <script src="js/app.js"></script>
</body>
</html>
